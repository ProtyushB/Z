appId: com.protyush.x
productName: X
copyright: Copyright © 2026 Protyush Banerjee

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - resources/**/*
  - package.json

asarUnpack:
  - "**/*.node"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: X
